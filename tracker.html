<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoupleFlow — MVP Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f8fafc;--muted:#94a3b8;--accent:#a855f7;--accent2:#7c3aed;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--orange:#f97316}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:24px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{color:var(--muted);font-size:14px;margin-top:4px}
.header-right{display:flex;gap:12px;align-items:center}
.last-updated{color:var(--muted);font-size:12px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:24px;overflow-x:auto}
.tab{padding:10px 20px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{background:var(--accent2);color:#fff}

/* Stats Row */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid transparent}
.stat-card.green{border-color:rgba(34,197,94,.3)}
.stat-card.yellow{border-color:rgba(234,179,8,.3)}
.stat-card.blue{border-color:rgba(59,130,246,.3)}
.stat-card.purple{border-color:rgba(168,85,247,.3)}
.stat-card.red{border-color:rgba(239,68,68,.3)}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700}
.stat-value.green{color:var(--green)}
.stat-value.yellow{color:var(--yellow)}
.stat-value.blue{color:var(--blue)}
.stat-value.purple{color:var(--accent)}
.stat-value.red{color:var(--red)}
.stat-detail{font-size:12px;color:var(--muted);margin-top:4px}

/* Progress bars */
.progress-section{margin-bottom:24px}
.phase-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:12px 16px;background:var(--surface);border-radius:10px}
.phase-label{min-width:200px;font-size:14px;font-weight:500}
.phase-bar-bg{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.phase-bar{height:100%;border-radius:4px;transition:width .5s ease}
.phase-pct{min-width:45px;text-align:right;font-size:13px;color:var(--muted);font-weight:600}

/* Task Table */
.task-table{width:100%;border-collapse:separate;border-spacing:0}
.task-table thead th{text-align:left;padding:12px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--surface2);position:sticky;top:0;background:var(--bg);z-index:1}
.task-table tbody tr{transition:.15s}
.task-table tbody tr:hover{background:var(--surface)}
.task-table td{padding:10px 16px;border-bottom:1px solid rgba(71,85,105,.3);font-size:14px;vertical-align:top}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge.done{background:rgba(34,197,94,.15);color:var(--green)}
.badge.in-progress{background:rgba(59,130,246,.15);color:var(--blue)}
.badge.todo{background:rgba(148,163,184,.15);color:var(--muted)}
.badge.blocked{background:rgba(239,68,68,.15);color:var(--red)}
.badge.critical{background:rgba(239,68,68,.15);color:var(--red)}
.badge.high{background:rgba(249,115,22,.15);color:var(--orange)}
.badge.medium{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge.low{background:rgba(148,163,184,.15);color:var(--muted)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--surface2);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:.15s}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(168,85,247,.08)}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;min-height:500px}
.kanban-col{background:var(--surface);border-radius:12px;padding:16px;display:flex;flex-direction:column}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--surface2)}
.kanban-col-title{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kanban-col-count{background:var(--surface2);padding:2px 8px;border-radius:99px;font-size:12px;color:var(--muted)}
.kanban-card{background:var(--bg);border:1px solid var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px;cursor:default;transition:.15s}
.kanban-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.kanban-card-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
.kanban-card-meta{display:flex;gap:6px;flex-wrap:wrap}
.kanban-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--muted)}

/* Timeline */
.timeline-container{overflow-x:auto;padding-bottom:16px}
.timeline-grid{min-width:900px}
.timeline-header{display:grid;grid-template-columns:220px repeat(6,1fr);gap:0;margin-bottom:8px}
.timeline-month{text-align:center;font-size:12px;color:var(--muted);padding:8px;border-left:1px solid var(--surface2)}
.timeline-row{display:grid;grid-template-columns:220px repeat(6,1fr);gap:0;margin-bottom:4px;align-items:center;min-height:36px}
.timeline-task-label{font-size:13px;padding:8px 12px;background:var(--surface);border-radius:6px 0 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-cell{position:relative;height:36px;border-left:1px solid rgba(71,85,105,.2)}
.timeline-bar{position:absolute;top:8px;height:20px;border-radius:4px;opacity:.85;min-width:8px}

/* Responsive */
@media(max-width:900px){
.kanban{grid-template-columns:1fr 1fr}
.stats{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
.kanban{grid-template-columns:1fr}
.header h1{font-size:22px}
}
</style>
</head>

// === DERIVED DATA ===
const phases = [...new Set(tasks.map(t=>t.phase))];
const phaseColors = {
  "Core Infrastructure":"#22c55e",
  "Financial Features":"#3b82f6",
  "Integrations":"#a855f7",
  "Couple Features":"#f472b6",
  "UX Polish":"#eab308",
  "Testing & Quality":"#ef4444",
  "Launch Prep":"#f97316",
  "Workflow & Polish":"#06b6d4",
  "Screen Redesigns":"#8b5cf6",
  "Flinks Integration":"#14b8a6",
  "AI Enhancement":"#f43f5e"
};
const phaseTimeline = {
  "Core Infrastructure":{start:0,end:1},
  "Financial Features":{start:0,end:2},
  "Integrations":{start:1,end:3},
  "Couple Features":{start:2,end:4},
  "UX Polish":{start:2,end:4},
  "Testing & Quality":{start:3,end:5},
  "Launch Prep":{start:4,end:6},
  "Workflow & Polish":{start:4,end:6},
  "Screen Redesigns":{start:1,end:2},
  "Flinks Integration":{start:2,end:4},
  "AI Enhancement":{start:3,end:6}
};
const months = ["Mar '26","Apr '26","May '26","Jun '26","Jul '26","Aug '26"];

function getPhaseStats(phase){
  const pts = tasks.filter(t=>t.phase===phase);
  const done = pts.filter(t=>t.status==='done').length;
  return {total:pts.length, done, pct:Math.round(done/pts.length*100)};
}
function getAllStats(){
  const done=tasks.filter(t=>t.status==='done').length;
  const ip=tasks.filter(t=>t.status==='in-progress').length;
  const todo=tasks.filter(t=>t.status==='todo').length;
  const blocked=tasks.filter(t=>t.status==='blocked').length;
  return {total:tasks.length,done,ip,todo,blocked,pct:Math.round(done/tasks.length*100)};
}

// === RENDER ===
let currentTab = 'dashboard';
let statusFilter = 'all';
let phaseFilter = 'all';

function render(){
  const s = getAllStats();
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <h1>CoupleFlow — MVP Tracker</h1>
        <div class="header-sub">React Native + Go • ${s.total} tasks across ${phases.length} phases</div>
      </div>
      <div class="header-right">
        <span class="last-updated">Updated: April 1, 2026</span>
      </div>
    </div>

    <div class="tabs">
      ${['dashboard','kanban','timeline','phases'].map(t=>
        `<button class="tab ${currentTab===t?'active':''}" onclick="currentTab='${t}';render()">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`
      ).join('')}
    </div>

    ${currentTab==='dashboard' ? renderDashboard(s) :
      currentTab==='kanban' ? renderKanban() :
      currentTab==='timeline' ? renderTimeline() :
      renderPhases()}
  `;
}

function renderDashboard(s){
  return `
    <div class="stats">
      <div class="stat-card purple">
        <div class="stat-label">Overall Progress</div>
        <div class="stat-value purple">${s.pct}%</div>
        <div class="stat-detail">${s.done} of ${s.total} tasks done</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Completed</div>
        <div class="stat-value green">${s.done}</div>
        <div class="stat-detail">Across ${phases.filter(p=>getPhaseStats(p).done>0).length} phases</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">In Progress</div>
        <div class="stat-value blue">${s.ip}</div>
        <div class="stat-detail">Actively working</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">To Do</div>
        <div class="stat-value yellow">${s.todo}</div>
        <div class="stat-detail">Remaining for MVP</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Critical Priority</div>
        <div class="stat-value red">${tasks.filter(t=>t.priority==='critical'&&t.status!=='done').length}</div>
        <div class="stat-detail">Unfinished critical tasks</div>
      </div>
    </div>

    <div class="progress-section">
      ${phases.map(p=>{
        const ps=getPhaseStats(p);
        return `<div class="phase-row">
          <div class="phase-label" style="color:${phaseColors[p]}">${p}</div>
          <div class="phase-bar-bg"><div class="phase-bar" style="width:${ps.pct}%;background:${phaseColors[p]}"></div></div>
          <div class="phase-pct">${ps.done}/${ps.total}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="filters">
      ${['all','done','in-progress','todo','blocked'].map(f=>
        `<button class="filter-btn ${statusFilter===f?'active':''}" onclick="statusFilter='${f}';render()">${f==='all'?'All':f==='in-progress'?'In Progress':f.charAt(0).toUpperCase()+f.slice(1)}</button>`
      ).join('')}
      <span style="color:var(--surface2)">|</span>
      ${['all',...phases].map(f=>
        `<button class="filter-btn ${phaseFilter===f?'active':''}" onclick="phaseFilter='${f}';render()">${f==='all'?'All Phases':f}</button>`
      ).join('')}
    </div>

    <table class="task-table">
      <thead><tr><th>#</th><th>Task</th><th>Phase</th><th>Status</th><th>Priority</th><th>Area</th><th>Notes</th></tr></thead>
      <tbody>
        ${tasks.filter(t=>(statusFilter==='all'||t.status===statusFilter)&&(phaseFilter==='all'||t.phase===phaseFilter))
          .map(t=>`<tr>
            <td style="color:var(--muted)">${t.id}</td>
            <td style="font-weight:500">${t.title}</td>
            <td><span style="color:${phaseColors[t.phase]};font-size:12px">${t.phase}</span></td>
            <td><span class="badge ${t.status}">${t.status==='in-progress'?'In Progress':t.status}</span></td>
            <td><span class="badge ${t.priority}">${t.priority}</span></td>
            <td style="color:var(--muted);font-size:12px">${t.area}</td>
            <td style="color:var(--muted);font-size:12px;max-width:280px">${t.notes}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function renderKanban(){
  const cols = [
    {key:'todo',label:'To Do',color:'var(--muted)'},
    {key:'in-progress',label:'In Progress',color:'var(--blue)'},
    {key:'done',label:'Done',color:'var(--green)'},
    {key:'blocked',label:'Blocked',color:'var(--red)'}
  ];
  return `<div class="kanban">${cols.map(c=>{
    const ct = tasks.filter(t=>t.status===c.key);
    return `<div class="kanban-col">
      <div class="kanban-col-header">
        <span class="kanban-col-title" style="color:${c.color}">${c.label}</span>
        <span class="kanban-col-count">${ct.length}</span>
      </div>
      <div style="overflow-y:auto;flex:1">
        ${ct.map(t=>`<div class="kanban-card">
          <div class="kanban-card-title">${t.title}</div>
          <div class="kanban-card-meta">
            <span class="kanban-tag" style="color:${phaseColors[t.phase]}">${t.phase}</span>
            <span class="kanban-tag">${t.area}</span>
            <span class="kanban-tag badge ${t.priority}" style="background:transparent;padding:2px 7px;font-size:10px">${t.priority}</span>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTimeline(){
  return `<div class="timeline-container"><div class="timeline-grid">
    <div class="timeline-header">
      <div style="font-size:12px;color:var(--muted);padding:8px">Phase</div>
      ${months.map(m=>`<div class="timeline-month">${m}</div>`).join('')}
    </div>
    ${phases.map(p=>{
      const tl = phaseTimeline[p];
      const ps = getPhaseStats(p);
      return `<div class="timeline-row">
        <div class="timeline-task-label" style="color:${phaseColors[p]}">${p} <span style="color:var(--muted);font-size:11px">(${ps.pct}%)</span></div>
        ${months.map((_,i)=>{
          const isStart = i===tl.start;
          const inRange = i>=tl.start && i<tl.end;
          return `<div class="timeline-cell">
            ${inRange ? `<div class="timeline-bar" style="background:${phaseColors[p]};left:${isStart?'8px':'0'};right:${i===tl.end-1?'8px':'0'};${isStart?'border-radius:4px 0 0 4px':''}${i===tl.end-1?'border-radius:0 4px 4px 0':''}"></div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div></div>

  <div style="margin-top:24px">
    <h3 style="font-size:16px;margin-bottom:16px;color:var(--muted)">Milestone Targets</h3>
    <div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
      <div class="stat-card green">
        <div class="stat-label">Apr 15 — Core Complete</div>
        <div class="stat-detail">All infrastructure + financial features working end-to-end</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">May 1 — Couple Mode V1</div>
        <div class="stat-detail">Partner dashboard, activity feed, shared budgets live</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">Jun 1 — UX Aligned to Prototype</div>
        <div class="stat-detail">Glassmorphic design, theme toggle, FAB, drawer nav</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Jul 1 — Testing Complete</div>
        <div class="stat-detail">Unit, integration, E2E tests passing; security audit done</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Aug 1 — Beta Launch</div>
        <div class="stat-detail">TestFlight + internal testing with 5-10 couples</div>
      </div>
    </div>
  </div>`;
}

function renderPhases(){
  return phases.map(p=>{
    const pts = tasks.filter(t=>t.phase===p);
    const ps = getPhaseStats(p);
    return `<div style="margin-bottom:32px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="width:4px;height:28px;border-radius:2px;background:${phaseColors[p]}"></div>
        <h2 style="font-size:18px;font-weight:600">${p}</h2>
        <span style="color:var(--muted);font-size:14px">${ps.done}/${ps.total} done (${ps.pct}%)</span>
      </div>
      <div style="display:grid;gap:8px">
        ${pts.map(t=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-radius:10px;border-left:3px solid ${t.status==='done'?'var(--green)':t.status==='in-progress'?'var(--blue)':'var(--surface2)'}">
          <span style="font-size:18px">${t.status==='done'?'✓':t.status==='in-progress'?'◐':'○'}</span>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500;${t.status==='done'?'opacity:.6;text-decoration:line-through':''}">${t.title}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${t.notes}</div>
          </div>
          <span class="badge ${t.priority}">${t.priority}</span>
          <span class="badge ${t.status}">${t.status==='in-progress'?'In Progress':t.status}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

render();
</script>
